<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAYZ MODFACTORY MODS</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0d1117;
    color: #e6edf3;
    min-height: 100vh;
  }
  header {
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo {
    font-size: 15px;
    font-weight: 700;
    color: #58a6ff;
    letter-spacing: .3px;
  }
  .lang-btn {
    margin-left: auto;
    background: #21262d;
    border: 1px solid #30363d;
    color: #e6edf3;
    font-size: 12px;
    font-family: inherit;
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
  }
  .lang-btn:hover { opacity: .82; }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px;
  }
  .page-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .page-desc {
    font-size: 14px;
    color: #8b949e;
    margin-bottom: 32px;
    line-height: 1.6;
  }

  .mods-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }
  .mod-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: border-color .15s;
  }
  .mod-card:hover { border-color: #58a6ff66; }
  .mod-card img {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
    background: #21262d;
  }
  .mod-body {
    padding: 18px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .mod-name {
    font-size: 15px;
    font-weight: 600;
    color: #e6edf3;
  }
  .mod-short-desc {
    font-size: 13px;
    color: #8b949e;
    line-height: 1.6;
    flex: 1;
  }
  .mod-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .mod-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 14px;
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #e6edf3;
    font-size: 13px;
    text-decoration: none;
    cursor: pointer;
    font-family: inherit;
    transition: opacity .1s;
  }
  .mod-link:hover { opacity: .82; }
  .mod-link.primary {
    background: #1f6feb;
    border-color: #388bfd;
    color: #fff;
  }

  /* Modal */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    max-width: 820px;
    width: 100%;
    max-height: 90vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 24px 64px rgba(0,0,0,.6);
    animation: modalIn .18s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(.96); }
    to   { opacity: 1; transform: scale(1); }
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid #30363d;
    flex-shrink: 0;
  }
  .modal-title {
    font-size: 16px;
    font-weight: 600;
  }
  .modal-close {
    background: none;
    border: none;
    color: #8b949e;
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .modal-close:hover { background: #21262d; color: #e6edf3; }
  .modal-body {
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    flex: 1;
  }
  .modal-img {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
    background: #21262d;
    flex-shrink: 0;
  }
  .modal-info {
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .modal-desc {
    font-size: 14px;
    color: #8b949e;
    line-height: 1.8;
    white-space: pre-line;
  }
  .modal-video {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: 8px;
    overflow: hidden;
    background: #000;
  }
  .modal-video iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  [data-lang] { display: none; }
  .lang-en [data-lang="en"] { display: block; }
  .lang-ru [data-lang="ru"] { display: block; }
  .inline-lang [data-lang] { display: none; }
  .lang-en .inline-lang [data-lang="en"],
  .lang-ru .inline-lang [data-lang="ru"] { display: inline; }
</style>
<script src="mods.js"></script>
</head>
<body class="lang-en">

<header>
  <button class="lang-btn" onclick="toggleLang()">RU / EN</button>
</header>

<div class="container">
  <div class="page-title">
    <span class="inline-lang"><span data-lang="en">DAYZ MODFACTORY MODS</span><span data-lang="ru">Модификации MODFACTORY DAYZ</span></span>
  </div>
  <div class="page-desc">
    <span data-lang="en">A collection of modifications developed by ModFactory team for DayZ servers.</span>
    <span data-lang="ru">Коллекция модификаций разработанных командой ModFactory для серверов DayZ.</span>
  </div>
  <div class="mods-grid" id="modsGrid"></div>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="modal" onclick="closeIfBackdrop(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle"></span>
      <div style="display:flex;align-items:center;gap:8px">
        <a class="mod-link" id="modalDiscord" href="#" target="_blank" style="padding:4px 12px;font-size:12px">&#128172; Discord</a>
        <button class="modal-close" onclick="closeModal()">&#10005;</button>
      </div>
    </div>
    <div class="modal-body">
      <img class="modal-img" id="modalImg" src="" alt="">
      <div class="modal-info">
        <div class="modal-desc" id="modalDesc"></div>
        <div class="modal-video" id="modalVideo" style="display:none">
          <iframe id="modalVideoFrame" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  var _lang = localStorage.getItem('mods_lang') || 'en';
  var _mods = [];
  var _openIdx = -1;

  applyLang();

  (function() {
    var data = MODS_DATA.slice();
    for (var i = data.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = data[i]; data[i] = data[j]; data[j] = t;
    }
    _mods = data;
    renderCards();
  })();

  function renderCards() {
    var grid = document.getElementById('modsGrid');
    grid.innerHTML = '';
    _mods.forEach(function(mod, idx) {
      var card = document.createElement('div');
      card.className = 'mod-card';
      card.innerHTML =
        '<img src="' + esc(mod.img) + '" alt="">' +
        '<div class="mod-body">' +
          '<div class="mod-name"></div>' +
          '<div class="mod-short-desc"></div>' +
          '<div class="mod-actions">' +
            '<button class="mod-link primary" onclick="openMod(' + idx + ')">' +
              '<span class="inline-lang">' +
                '<span data-lang="en">Details</span>' +
                '<span data-lang="ru">Подробнее</span>' +
              '</span>' +
            '</button>' +
            '<a class="mod-link" href="' + esc(mod.discord || '#') + '" target="_blank">&#128172; Discord</a>' +
          '</div>' +
        '</div>';
      grid.appendChild(card);
    });
    updateCardTexts();
  }

  function updateCardTexts() {
    var cards = document.querySelectorAll('.mod-card');
    cards.forEach(function(card, idx) {
      var mod = _mods[idx];
      if (!mod) return;
      card.querySelector('.mod-name').textContent      = mod.name[_lang] || mod.name.en;
      card.querySelector('.mod-short-desc').textContent = mod.shortDesc[_lang] || mod.shortDesc.en;
    });
  }

  function toggleLang() {
    _lang = _lang === 'en' ? 'ru' : 'en';
    localStorage.setItem('mods_lang', _lang);
    applyLang();
  }

  function applyLang() {
    document.body.classList.toggle('lang-en', _lang === 'en');
    document.body.classList.toggle('lang-ru', _lang === 'ru');
    updateCardTexts();
    if (_openIdx >= 0) fillModal(_openIdx);
  }

  function openMod(idx) {
    _openIdx = idx;
    fillModal(idx);
    document.getElementById('modal').classList.add('open');
    document.addEventListener('keydown', onEsc);
  }

  function fillModal(idx) {
    var mod = _mods[idx];
    document.getElementById('modalImg').src            = mod.img || '';
    document.getElementById('modalTitle').textContent  = mod.name[_lang] || mod.name.en;
    document.getElementById('modalDesc').textContent   = mod.desc[_lang] || mod.desc.en;
    document.getElementById('modalDiscord').href       = mod.discord || '#';
    var yt  = mod.youtube || '';
    var vid = document.getElementById('modalVideo');
    var frm = document.getElementById('modalVideoFrame');
    if (yt) {
      var id = yt.match(/(?:youtu\.be\/|v=)([\w-]{11})/);
      frm.src = id ? 'https://www.youtube.com/embed/' + id[1] + '?rel=0' : yt;
      vid.style.display = '';
    } else {
      frm.src = '';
      vid.style.display = 'none';
    }
  }

  function closeModal() {
    _openIdx = -1;
    document.getElementById('modal').classList.remove('open');
    document.getElementById('modalVideoFrame').src = '';
    document.removeEventListener('keydown', onEsc);
  }

  function closeIfBackdrop(e) {
    if (e.target === document.getElementById('modal')) closeModal();
  }

  function onEsc(e) {
    if (e.key === 'Escape') closeModal();
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
